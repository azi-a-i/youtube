<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} | LLMNoteTube</title>
  <meta name="description" content="LLMNoteTube is a protected research workspace for YouTube discovery and NotebookLM analysis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="{{ page_name }}">
  <div class="page-glow glow-a"></div>
  <div class="page-glow glow-b"></div>
  <div class="page-grid"></div>

  {% if current_user %}
    <header class="site-header">
      <a class="brand-mark" href="{{ url_for('workspace_page') }}">
        <span class="brand-mark-dot"></span>
        <span>LLMNoteTube</span>
      </a>

      <div class="site-actions">
        <span class="user-badge">{{ current_user }}</span>
        <form action="{{ url_for('logout_page') }}" method="post">
          <button type="submit" class="button button-ghost button-small">Logout</button>
        </form>
      </div>
    </header>
  {% endif %}

  <main class="page-shell {% if page_name == 'login' %}login-shell{% endif %}">
    {% block content %}{% endblock %}
  </main>

  <script>
    window.LLMNOTETUBE_BOOTSTRAP = {{ bootstrap | tojson }};
  </script>
  <script src="/app.js"></script>
</body>
</html>
